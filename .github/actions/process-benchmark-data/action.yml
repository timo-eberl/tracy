name: 'Process Benchmark Data'
description: 'Updates the orphan benchmark branch with new scores, plots, and a directory of renderings'

inputs: 
  bench_version:
    description: 'The version/build string for the current run'
    required: true

runs:
  using: "composite"
  steps:
    - name: Checkout Benchmark Branch
      uses: actions/checkout@v4
      with:
        ref: benchmarks
        path: data-branch
        fetch-depth: 0

    - name: Setup Python
      shell: bash
      run: python3 -m pip install matplotlib

    - name: Integrate Data and Renderings
      shell: bash
      run: |
        SRC_DIR="${{ github.workspace }}/tests/img/exr"
        DEST_DIR="${{ github.workspace }}/data-branch"
        VERSION="${{ inputs.bench_version }}"

        # Make sure our target structure exists
        mkdir -p "$DEST_DIR/logs/$VERSION"
        mkdir -p "$DEST_DIR/renderings/$VERSION"

        # Update the master history file
        python3 scripts/update_benchmark.py rmse_results.json "$DEST_DIR/history.csv"

        # Archive the render logs for this version
        shopt -s nullglob
        cp $SRC_DIR/reference/*.png "$DEST_DIR/renderings/"
        cp $SRC_DIR/zig_render/*.txt "$DEST_DIR/logs/$VERSION/"

        # Handle previews if they exist
        if [ -d "$SRC_DIR/previews" ]; then
          # Save a versioned copy of the previews
          cp $SRC_DIR/previews/*.png "$DEST_DIR/renderings/$VERSION/"
          
          # Update the "latest" pointers for the dashboard
          for img in $SRC_DIR/previews/*.png; do
            base=$(basename "$img")
            cp "$img" "$DEST_DIR/renderings/latest-$base"
          done
        fi

        # Archive the error diffs
        cp $SRC_DIR/diffs/*.png "$DEST_DIR/renderings/$VERSION/"
        # Update the "latest" diff pointers for the dashboard
        for img in $SRC_DIR/diffs/*.png; do
          base=$(basename "$img")
            cp "$img" "$DEST_DIR/renderings/latest-$base"
          done
        # Run the plot generation script
        python3 scripts/generate_plots.py "$SRC_DIR/zig_render/" "$DEST_DIR/history.csv" "$DEST_DIR/plots/" 30

    - name: Update Dashboard
      shell: bash
      run: |
        python3 scripts/generate_dashboard.py "${{ github.workspace }}/data-branch/history.csv" "${{ github.workspace }}/data-branch/README.md"

    - name: Commit and Push
      shell: bash
      working-directory: data-branch
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "Benchmark Update: ${{ inputs.bench_version }}" || echo "no changes"
        git push origin HEAD:benchmarks
