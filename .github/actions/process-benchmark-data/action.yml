name: 'Process Benchmark Data'
description: 'Updates the orphan benchmark branch with new scores, plots, and a directory of renderings'

inputs: 
  bench_version:
    description: 'The version/build string for the current run'
    required: true

runs:
  using: "composite"
  steps:
    - name: Checkout Benchmark Branch
      uses: actions/checkout@v4
      with:
        ref: benchmarks
        path: data-branch
        fetch-depth: 0

    - name: Setup Python & Dependencies
      shell: bash
      run: |
        python3 -m pip install matplotlib

    - name: Integrate Data and Renderings
      shell: bash
      run: |
        mkdir -p data-branch/logs
        mkdir -p data-branch/renderings
        
        # Update History CSV (using the JSON generated from multiple files)
        python3 scripts/update_benchmark.py rmse_results.json data-branch/history.csv

        # Sync all new renderings (Previews and Diffs)
        # We copy everything from our preview folders into the data branch.
        # Filenames like 'render_st_CornellBox.png' are preserved.
        
        cp -v tests/img/exr/previews/*.png data-branch/renderings/
        cp -v tests/img/exr/diffs/*.png data-branch/renderings/

        # Create 'Latest' symlinks or copies for the dashboard
        for img in previews/*.png; do
          base=$(basename "$img")
          cp "$img" "data-branch/renderings/latest-$base"
        done

        # Generate Plots
        # We pass the history.csv to generate the trend lines
        python3 scripts/generate_plots.py data-branch/history.csv data-branch/renderings/ 30

    - name: Update Dashboard
      shell: bash
      run: |
        # Generate the README/Dashboard using the updated history
        python3 scripts/generate_dashboard.py data-branch/history.csv data-branch/README.md

    - name: Commit and Push
      shell: bash
      working-directory: data-branch
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "Benchmark: ${{ inputs.bench_version }}" || echo "No changes to commit"
        git push origin HEAD:benchmarks
