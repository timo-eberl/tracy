name: 'Process Benchmark Data'
description: 'Updates the orphan benchmark branch with new scores, plots, and a directory of renderings'

inputs: 
  bench_version:
    description: 'The version/build string for the current run'
    required: true

runs:
  using: "composite"
  steps:
    - name: Checkout Benchmark Branch
      uses: actions/checkout@v4
      with:
        ref: benchmarks
        path: data-branch
        fetch-depth: 0

    - name: Setup Python
      shell: bash
      run: python3 -m pip install matplotlib

    - name: Integrate Data and Renderings
      shell: bash
      run: |
        SRC_DIR="${{ github.workspace }}/tests/img/exr"
        DEST_DIR="${{ github.workspace }}/data-branch"

        # debug: this will show us exactly what files exist if cp fails
        echo "--- Debug: List all files in tests/img/exr ---"
        ls -R $SRC_DIR

        mkdir -p $DEST_DIR/logs
        mkdir -p $DEST_DIR/renderings
        
        # 1. update history csv
        python3 scripts/update_benchmark.py rmse_results.json $DEST_DIR/history.csv

        # 2. copy renderings
        # we use 'nullglob' so the loop just skips if no pngs exist
        shopt -s nullglob
        
        cp -v $SRC_DIR/previews/*.png $DEST_DIR/renderings/ || echo "no previews found"
        cp -v $SRC_DIR/diffs/*.png $DEST_DIR/renderings/ || echo "no diffs found"

        # 3. create 'latest' links
        for img in $SRC_DIR/previews/*.png; do
          base=$(basename "$img")
          cp "$img" "$DEST_DIR/renderings/latest-$base"
        done

        # 4. generate plots
        python3 scripts/generate_plots.py $SRC_DIR/zig_render/ $DEST_DIR/history.csv $DEST_DIR/renderings/ 30

    - name: Update Dashboard
      shell: bash
      run: |
        python3 scripts/generate_dashboard.py ${{ github.workspace }}/data-branch/history.csv ${{ github.workspace }}/data-branch/README.md

    - name: Commit and Push
      shell: bash
      working-directory: data-branch
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add .
        # we use the input variable here
        git commit -m "Benchmark Update: ${{ inputs.bench_version }}" || echo "no changes"
        git push origin HEAD:benchmarks
