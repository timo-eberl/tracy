name: 'Process Benchmark Data'
runs:
  using: "composite"
  steps:
    - name: Checkout Benchmark Branch
      uses: actions/checkout@v4
      with:
        ref: benchmarks
        path: data-branch
        fetch-depth: 0

    - name: Setup Python
      shell: bash
      run: python3 -m pip install matplotlib

    - name: Integrate Data and Renderings
      shell: bash
      run: |
        # define paths clearly to avoid "cannot stat" errors
        SRC_DIR="${{ github.workspace }}/tests/img/exr"
        DEST_DIR="${{ github.workspace }}/data-branch"

        mkdir -p $DEST_DIR/logs
        mkdir -p $DEST_DIR/renderings
        
        # update history csv
        python3 scripts/update_benchmark.py rmse_results.json $DEST_DIR/history.csv

        # copy renderings using absolute paths and force-overwrite
        # we add || true so the script doesn't crash if a folder is empty
        cp -v $SRC_DIR/previews/*.png $DEST_DIR/renderings/ || true
        cp -v $SRC_DIR/diffs/*.png $DEST_DIR/renderings/ || true

        # loop through previews specifically to create the 'latest' links
        # we check if files exist first to prevent the 'cannot stat' crash
        if ls $SRC_DIR/previews/*.png 1> /dev/null 2>&1; then
          for img in $SRC_DIR/previews/*.png; do
            base=$(basename "$img")
            cp "$img" "$DEST_DIR/renderings/latest-$base"
          done
        fi

        # generate plots - updated to point to the correct log directory
        python3 scripts/generate_plots.py $SRC_DIR/zig_render/ $DEST_DIR/history.csv $DEST_DIR/renderings/ 30

    - name: Update Dashboard
      shell: bash
      run: |
        python3 scripts/generate_dashboard.py ${{ github.workspace }}/data-branch/history.csv ${{ github.workspace }}/data-branch/README.md

    - name: Commit and Push
      shell: bash
      working-directory: data-branch
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "Benchmark Update" || echo "no changes"
        git push origin HEAD:benchmarks
