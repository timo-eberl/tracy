name: Manual Benchmarks Cleanup

on:
  workflow_dispatch: # Manual trigger only

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Benchmark Branch
        uses: actions/checkout@v4
        with:
          ref: benchmarks
          # We need full history to ensure we are modifying the existing branch
          fetch-depth: 0

      - name: Recursive Cleanup and Restructure
        shell: bash
        run: |
          # 1. Delete all files in the root (excluding .git)
          find . -maxdepth 1 -type f -not -path "./.git*" -delete

          # 2. Find all directories at the root (maxdepth 1)
          # For each root directory, wipe its contents and put a .gitkeep inside
          for dir in */; do
              # Skip the .git directory
              [[ "$dir" == ".git/" ]] && continue
              
              echo "Cleaning $dir but keeping the folder..."
              
              # Remove everything inside this directory recursively
              rm -rf "$dir"*
              
              # Re-place the .gitkeep so the empty directory stays tracked
              touch "$dir.gitkeep"
          done
      - name: Commit and Push Reset
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Add all changes (deletions and new .gitkeep files)
          git add -A
          
          # Only commit if there are actually changes to avoid workflow failure
          if git diff --staged --quiet; then
            echo "No files to delete."
          else
            git commit -m "Cleanup: Resetting benchmark data (kept directory structure)"
            git push origin benchmarks
          fi
