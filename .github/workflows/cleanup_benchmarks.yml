name: Manual Benchmarks Cleanup

on:
  workflow_dispatch: # Manual trigger only

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Benchmark Branch
        uses: actions/checkout@v4
        with:
          ref: benchmarks
          # We need full history to ensure we are modifying the existing branch
          fetch-depth: 0

      - name: Recursive Cleanup and Restructure
        shell: bash
        run: |
          # 1. Remove all currently tracked files from the index and disk
          # This is recursive by default and leaves the .git folder alone
          git rm -rf .

          # 2. Re-create the directory structure using .gitkeep
          # This finds every directory (excluding the .git folder and the root)
          # and places a .gitkeep inside it.
          find . -type d -not -path "./.git*" -not -path "." -exec touch {}/.gitkeep \;

          # 3. Add the .gitkeep files back to the index
          git add .

          echo "Directories:"
          find . -maxdepth 4 -not -path '*/.*'

      - name: Commit and Push Reset
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Add all changes (deletions and new .gitkeep files)
          git add -A
          
          # Only commit if there are actually changes to avoid workflow failure
          if git diff --staged --quiet; then
            echo "No files to delete."
          else
            git commit -m "Cleanup: Resetting benchmark data (kept directory structure)"
            git push origin benchmarks
          fi
